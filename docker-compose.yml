version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: deepfake_db
    environment:
      POSTGRES_USER: deepfake_admin
      POSTGRES_PASSWORD: secure_password_change_me
      POSTGRES_DB: deepfake_detection
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - deepfake_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deepfake_admin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: deepfake_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - deepfake_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI ML Backend (Python)
  ml_backend:
    build:
      context: ./backend/ml
      dockerfile: Dockerfile
    container_name: deepfake_ml
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgresql://deepfake_admin:secure_password_change_me@postgres:5432/deepfake_detection
      - GPU_ENABLED=false
    volumes:
      - ./backend/ml/models:/app/models
      - ./backend/ml/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - deepfake_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Node.js API Gateway
  api_gateway:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: deepfake_api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - ML_BACKEND_URL=http://ml_backend:8000
      - DATABASE_URL=postgresql://deepfake_admin:secure_password_change_me@postgres:5432/deepfake_detection
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your_jwt_secret_key_here
      - POLYGON_RPC_URL=https://polygon-rpc.com
      - CONTRACT_ADDRESS=0x0000000000000000000000000000000000000000
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - ml_backend
    networks:
      - deepfake_network
    volumes:
      - ./backend/api:/app

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: deepfake_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://api_gateway:3001
      - NEXT_PUBLIC_WS_URL=ws://api_gateway:3001
      - NEXT_PUBLIC_CONTRACT_ADDRESS=0x0000000000000000000000000000000000000000
    ports:
      - "3000:3000"
    depends_on:
      - api_gateway
    networks:
      - deepfake_network
    volumes:
      - ./app:/app/app
      - ./components:/app/components

volumes:
  postgres_data:
  redis_data:

networks:
  deepfake_network:
    driver: bridge
